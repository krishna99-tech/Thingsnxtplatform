services:
  # FastAPI Backend Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thingsnxt-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      # Allow connection to host machine's MongoDB
      - "host.docker.internal:host-gateway"
    environment:
      # MongoDB Connection - External MongoDB
      # Force connection to host machine using credentials from .env
      # This ignores the '127.0.0.1' URI in .env which is for local dev only
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@host.docker.internal:27017/${MONGO_DB_NAME:-iot_auth_db}?authSource=admin
      - MONGO_DB_NAME=${MONGO_DB_NAME:-iot_auth_db}
      # JWT Configuration
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - RESET_TOKEN_EXPIRE_HOURS=${RESET_TOKEN_EXPIRE_HOURS:-2}
      # Application Configuration
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://thingsnxt.vercel.app,http://192.168.29.139:3000}
      - OFFLINE_TIMEOUT=${OFFLINE_TIMEOUT:-20}
      # Email Configuration (optional)
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USER=${EMAIL_USER:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - APP_NAME=${APP_NAME:-ThingsNXT}
      - FRONTEND_URL=${FRONTEND_URL:-https://thingsnxt.vercel.app}
      - APP_SCHEME=${APP_SCHEME:-thingsnxt}
      - COMPANY_NAME=${COMPANY_NAME:-ThingsNXT}
      - COPYRIGHT_TEXT=${COPYRIGHT_TEXT:-© 2026 ThingsNXT. All rights reserved.}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-ThingsNXT Support}

      # Redis Configuration
      - REDIS_URL=redis://redis:6379
      # MQTT (Eclipse Mosquitto) — devices can use HTTP and/or MQTT
      - MQTT_ENABLED=${MQTT_ENABLED:-true}
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=${MQTT_TOPIC_PREFIX:-thingsnxt}
      # Optional auth (set in mosquitto for production):
      - MQTT_USER=${MQTT_USER:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      # Apache Kafka (telemetry bus; clients use HTTP/SSE under /integrations/kafka/*)
      - KAFKA_ENABLED=${KAFKA_ENABLED:-true}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_TELEMETRY=${KAFKA_TOPIC_TELEMETRY:-iot.telemetry.enriched}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
      kafka:
        condition: service_started
    volumes:
      # Mount templates directory if needed
      - ./templates:/app/templates:ro
      # Optional: Mount logs directory
      - ./logs:/app/logs

  # MQTT broker for ESP32 / IoT (telemetry uplink, command downlink)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: thingsnxt-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - app-network

  # Redis Service for Rate Limiting & Caching
  redis:
    image: redis:alpine
    container_name: thingsnxt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper (required by Kafka broker below)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: thingsnxt-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - app-network

  # Apache Kafka (telemetry bus; API uses KAFKA_BOOTSTRAP_SERVERS=kafka:9092)
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: thingsnxt-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network

volumes:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  zookeeper_data:
  kafka_data:

networks:
  app-network:
    driver: bridge